<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitchMaster - Entrenador de Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scrollText {
            from { transform: translateY(100%); }
            to { transform: translateY(-100%); }
        }
        .scrolling-content {
            animation: scrollText 60s linear infinite paused;
        }
        .running { animation-play-state: running; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-blue-600 text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">🚀 PitchMaster</h1>
        <p class="text-sm opacity-90">Herramienta de Capacitación</p>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <section class="bg-white p-5 rounded-xl shadow-md">
            <h2 class="text-lg font-semibold mb-3 border-b pb-2">1. Prepara tu Guion</h2>
            <div class="space-y-3">
                <textarea id="pitchInput" rows="5" class="w-full p-3 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="Escribe aquí tu discurso... 
Ej: ¿Sabía que las empresas pierden 20% en logística? Con nuestro servicio..."></textarea>
                <button onclick="updatePrompter()" class="w-full bg-green-500 text-white py-2 rounded-lg font-bold hover:bg-green-600 transition">Cargar al Teleprompter</button>
            </div>
        </section>

        <section class="bg-gray-900 text-green-400 p-5 rounded-xl shadow-inner relative overflow-hidden h-64">
            <div id="prompterBox" class="scrolling-content text-xl font-medium text-center leading-relaxed">
                Tu pitch aparecerá aquí... ¡Listo para practicar!
            </div>
            
            <div class="absolute bottom-2 right-2 bg-red-600 text-white px-3 py-1 rounded-full text-xs font-mono shadow-lg">
                TIEMPO: <span id="timer">60</span>s
            </div>
        </section>

        <div class="flex gap-4">
            <button id="startBtn" onclick="startPractice()" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition">▶ EMPEZAR</button>
            <button onclick="resetPractice()" class="bg-gray-400 text-white px-6 rounded-xl font-bold">↺</button>
        </div>

        <section class="bg-white p-5 rounded-xl shadow-md">
            <h2 class="text-lg font-semibold mb-3">✅ Autoevaluación</h2>
            <div class="space-y-2 text-sm text-gray-700">
                <label class="flex items-center gap-2"><input type="checkbox"> ¿Sonreí al inicio?</label>
                <label class="flex items-center gap-2"><input type="checkbox"> ¿Hice contacto visual?</label>
                <label class="flex items-center gap-2"><input type="checkbox"> ¿Fui claro con el beneficio?</label>
                <label class="flex items-center gap-2"><input type="checkbox"> ¿Hice una pregunta al final?</label>
            </div>
        </section>

    </main>

    <script>
        let timeLeft = 60;
        let timerInterval;
        const prompter = document.getElementById('prompterBox');
        const timerDisplay = document.getElementById('timer');

        function updatePrompter() {
            const text = document.getElementById('pitchInput').value;
            if(text) prompter.innerText = text;
            alert("¡Guion cargado!");
        }

        function startPractice() {
            if (timerInterval) return;
            
            prompter.classList.add('running');
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    stopPractice();
                    alert("¡Tiempo cumplido! ¿Lograste cerrarlo?");
                }
            }, 1000);
        }

        function stopPractice() {
            clearInterval(timerInterval);
            timerInterval = null;
            prompter.classList.remove('running');
        }

        function resetPractice() {
            stopPractice();
            timeLeft = 60;
            timerDisplay.innerText = timeLeft;
            prompter.style.transform = 'translateY(100%)';
        }
    </script>
</body>
</html>
